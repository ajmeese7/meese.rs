# Allow these well-known native packages to run their build scripts.
# (pnpm 11 blocks build scripts by default; Astro pulls in esbuild + sharp,
# wrangler pulls in workerd.)
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# Force a patched yaml everywhere. The only vulnerable copy (GHSA-48c2-rrv3-qjmp,
# stack overflow on deeply nested YAML) arrives transitively under the
# @astrojs/check dev type-checker, so it never ships, but keep the tree clean.
overrides:
  yaml: ">=2.8.3"
