<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); display:flex; flex-direction:column; gap:16px; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
  .label b { color: var(--accent); font-weight: 600; }
  .meta { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-3); }
  .code { font-family: var(--font-mono); font-size: 13px; color: var(--ink-2); background: var(--surface-well); border:1px solid var(--line-1); border-left:2px solid var(--accent-dim); border-radius: var(--radius-md); padding: 12px 14px; }
  .k { color: var(--accent); } .s { color: var(--green); } .c { color: var(--ink-4); }
</style>
</head>
<body>
  <div class="label">// SYSTEM&nbsp;&nbsp;&nbsp;<b>[ GUIDE ]</b>&nbsp;&nbsp;&nbsp;TOPICS · EXPO · REACT-NATIVE</div>
  <div class="meta">2026-06-08&nbsp;&nbsp;·&nbsp;&nbsp;updated 2026-06-11&nbsp;&nbsp;·&nbsp;&nbsp;7 min read</div>
  <div class="code"><span class="c">// build-time backlink pass</span><br><span class="k">const</span> edges = graph.<span class="s">resolve</span>(posts);</div>
</body>
</html>
