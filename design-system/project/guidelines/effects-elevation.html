<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & glow" subtitle="Low cool shadows; cyan glow carries focus/active" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--bg-base); display: flex; gap: 22px; align-items: center; }
  .u { text-align: center; }
  .box { width: 110px; height: 70px; background: var(--surface-2); border: 1px solid var(--line-1); border-radius: var(--radius-md); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); display: block; margin-top: 12px; }
</style>
</head>
<body>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-1)"></div><span class="lbl">shadow-1</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-2)"></div><span class="lbl">shadow-2</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-3)"></div><span class="lbl">shadow-3</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--glow-soft);border-color:var(--cyan-deep)"></div><span class="lbl">glow-soft</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--glow-ember);border-color:var(--ember-deep)"></div><span class="lbl">glow-ember</span></div>
</body>
</html>
