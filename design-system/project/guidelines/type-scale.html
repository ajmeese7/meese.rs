<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="2xs → 4xl modular ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-base); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); width: 64px; flex: none; letter-spacing: .04em; }
  .s { font-family: var(--font-display); color: var(--ink-1); font-weight: 500; letter-spacing: -.01em; line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="t">4xl · 54</span><span class="s" style="font-size:54px">Index</span></div>
  <div class="r"><span class="t">3xl · 42</span><span class="s" style="font-size:42px">Latest writing</span></div>
  <div class="r"><span class="t">2xl · 33</span><span class="s" style="font-size:33px">Section heading</span></div>
  <div class="r"><span class="t">xl · 26</span><span class="s" style="font-size:26px">Subsection heading</span></div>
  <div class="r"><span class="t">lg · 21</span><span class="s" style="font-size:21px">Card title goes here</span></div>
  <div class="r"><span class="t">base · 16.5</span><span class="s" style="font-family:var(--font-body);font-size:16.5px;color:var(--ink-2)">Body copy baseline for sustained reading</span></div>
  <div class="r"><span class="t">xs · 12.5</span><span class="s" style="font-family:var(--font-mono);font-size:12.5px;color:var(--ink-3)">metadata · dates · topics</span></div>
</body>
</html>
