<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid — space-1 → space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); display: flex; align-items: flex-end; gap: 14px; }
  .u { text-align: center; }
  .box { background: var(--cyan-wash); border: 1px solid var(--cyan-dim); border-radius: var(--radius-xs); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); display: block; margin-top: 8px; }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); display: block; }
</style>
</head>
<body>
  <div class="u"><div class="box" style="width:4px;height:4px"></div><span class="lbl">1</span><span class="px">4</span></div>
  <div class="u"><div class="box" style="width:8px;height:8px"></div><span class="lbl">2</span><span class="px">8</span></div>
  <div class="u"><div class="box" style="width:12px;height:12px"></div><span class="lbl">3</span><span class="px">12</span></div>
  <div class="u"><div class="box" style="width:16px;height:16px"></div><span class="lbl">4</span><span class="px">16</span></div>
  <div class="u"><div class="box" style="width:24px;height:24px"></div><span class="lbl">6</span><span class="px">24</span></div>
  <div class="u"><div class="box" style="width:32px;height:32px"></div><span class="lbl">7</span><span class="px">32</span></div>
  <div class="u"><div class="box" style="width:48px;height:48px"></div><span class="lbl">9</span><span class="px">48</span></div>
  <div class="u"><div class="box" style="width:64px;height:64px"></div><span class="lbl">10</span><span class="px">64</span></div>
</body>
</html>
